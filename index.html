<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peatland Restoration Decision Tool</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c4c38;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 35px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }
        
        /* Logo & Header Styling */
        .logo-container {
            margin-bottom: 15px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            fill: #27ae60;
            transition: transform 0.3s ease;
        }
        .logo-container:hover .logo-icon {
            transform: scale(1.05) rotate(-2deg);
        }

        h2 { 
            color: #2c3e50; 
            margin: 10px 0 0 0; 
            font-size: 24px; 
            letter-spacing: -0.5px;
        }
        h3 { 
            color: #4f5f6f; 
            font-size: 18px; 
            margin-bottom: 25px; 
            font-weight: 500; 
            min-height: 54px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            line-height: 1.4;
        }
        .divider { 
            height: 1px; 
            background-color: #eef2f5; 
            margin: 20px 0 25px 0; 
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        button, .btn-link {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }
        button:active {
            transform: scale(0.98);
        }
        .btn-yes { background-color: #27ae60; color: white; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2); }
        .btn-yes:hover { background-color: #219653; box-shadow: 0 6px 12px rgba(39, 174, 96, 0.3); }
        
        .btn-no { background-color: #e74c3c; color: white; box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2); }
        .btn-no:hover { background-color: #c0392b; box-shadow: 0 6px 12px rgba(231, 76, 60, 0.3); }
        
        .btn-pdf { background-color: #2980b9; color: white; margin-top: 10px; box-sizing: border-box; width: 100%;}
        .btn-pdf:hover { background-color: #2471a3; }
        
        .btn-restart { 
            background-color: #f1f2f6; 
            color: #7f8c8d; 
            margin-top: 30px; 
            width: 100%; 
            font-weight: 600;
            font-size: 14px;
            padding: 10px;
        }
        .btn-restart:hover { background-color: #e4e7eb; color: #57606f; }
        
        .intervention {
            font-size: 22px;
            color: #1b4f72;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            background: #e1f5fe;
            border-radius: 8px;
            border-left: 5px solid #2980b9;
        }
    </style>
</head>
<body>

<div class="logo-container">
        <img src="logo_1.png" alt="Peatland Tool Logo" style="height: 65px; width: auto;">
    </div>
    
    <h2>Peatland Restoration Decision Tool</h2>
    <div class="divider"></div>

    <div id="app-content"></div>

    <button class="btn-restart" onclick="restartApp()">🔄 Start Over</button>
</div>

<script>
const tree = {
    start: {
        text: "Is the gully eroding?",
        yes: "q2",
        no: "result_nwn"
    },
    q2: {
        text: "Is there peat at the base of the gully?",
        yes: "q_peat_shallow",
        no: "q_stone_drop"
    },
    q_peat_shallow: {
        text: "Is the peat shallower than 15cm?",
        yes: "q_stone_drop",
        no: "q_width_sphag"
    },
    q_sphagnym_present: {
        text: "Is the peat vegetated with sphagnum present?",
        yes: "q_width_sphag",
        no: "q_width_no_sphag"
    },
    q_width_sphag: {
        text: "Is it less than 3m wide?",
        yes: "result_timber_dam",
        no: "result_timber_baffle"
    },
    q_width_no_sphag: {
        text: "Is it less than 3m wide?",
        yes: "result_peat_dam",
        no: "result_timber_baffle"
    },
    q_stone_drop: {
        text: "Is the gully large enough for a stone drop?",
        yes: "q_wider_3m",
        no: "q_slope_shallow"
    },
    q_wider_3m: {
        text: "Is it wider than 3m?",
        yes: "result_stone_baffle",
        no: "result_stone_dam"
    },
    q_slope_shallow: {
        text: "Is the slope shallow enough for coir logs or heather bales?",
        yes: "result_coir",
        no: "result_handball"
    },
    result_nwn: { text: "No work Necessary (NWN)", isEnd: true },
    result_peat_dam: { text: "Intervention: Peat dam", isEnd: true },
    result_timber_baffle: { text: "Intervention: Timber baffle", isEnd: true, pdf: "guides/timber_dam.pdf" },
    result_timber_dam: { text: "Intervention: Timber dam", isEnd: true, pdf: "guides/timber_dam.pdf" },
    result_stone_baffle: { text: "Intervention: Stone baffle", isEnd: true, pdf: "guides/stone_dam.pdf" },
    result_stone_dam: { text: "Intervention: Stone dam", isEnd: true, pdf: "guides/stone_dam.pdf" },
    result_coir: { text: "Intervention: Coir log/heather bale", isEnd: true, pdf: "guides/coir_heather.pdf" },
    result_handball: { text: "Intervention: Consider if stone could be handballed in", isEnd: true }
};

let currentNode = "start";

function render() {
    const container = document.getElementById("app-content");
    const node = tree[currentNode];

    if (!node) {
        container.innerHTML = `<h3>Error: Step data not found.</h3>`;
        return;
    }

    if (node.isEnd) {
        let htmlContent = `
            <h3>Recommended Outcome</h3>
            <div class="intervention">${node.text}</div>
        `;
        
        if (node.pdf) {
            htmlContent += `<a href="${node.pdf}" target="_blank" class="btn-link btn-pdf">📄 Download PDF Guide</a>`;
        }
        
        container.innerHTML = htmlContent;
    } else {
        container.innerHTML = `
            <h3>${node.text}</h3>
            <div class="btn-container">
                <button class="btn-yes" onclick="handleAnswer('yes')">YES</button>
                <button class="btn-no" onclick="handleAnswer('no')">NO</button>
            </div>
        `;
    }
}

function handleAnswer(choice) {
    if (tree[currentNode] && tree[currentNode][choice]) {
        currentNode = tree[currentNode][choice];
        render();
    }
}

function restartApp() {
    currentNode = "start";
    render();
}

render();
</script>

</body>
</html>
