<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timber Dam Examples</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c4c38;
            color: #333;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        h1 {
            color: white;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        p.intro {
            color: #e2f0d9;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.5;
        }
        .sub-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .photo-caption {
            padding: 12px;
            font-size: 14px;
            color: #555;
            text-align: center;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="gallery.html" class="btn-back">⬅ Back to Main Gallery</a>
        <h1>Peat Dam Examples</h1>
        <p class="intro">Reviewing field implementations of standard timber dams used for ditch blocking and rewetting projects.</p>
    </div>

    <div class="sub-gallery-grid">
        <div class="photo-card">
            <img src="images/timber-dam-1.jpg" alt="Timber dam">
            
        </div>
        
        <div class="photo-card">
            <img src="images/timber_dam_2.jpg">
            
        </div>

        <div class="photo-card">
            <img src="images/timber_dam_3.jpg">
            
        </div>
    </div>

</body>
</html>
