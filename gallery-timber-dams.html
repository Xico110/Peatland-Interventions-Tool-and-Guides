<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timber Dam Examples</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c4c38;
            color: #333;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        h1 {
            color: white;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        p.intro {
            color: #e2f0d9;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.5;
        }
        .sub-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer; /* Makes it look clickable */
            transition: transform 0.2s;
        }
        .photo-card:hover {
            transform: scale(1.02); /* Slight hover animation */
        }
        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .photo-caption {
            padding: 12px;
            font-size: 14px;
            color: #555;
            text-align: center;
            font-style: italic;
        }

        /* --- LIGHTBOX MODAL STYLES --- */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox-content {
            max-width: 80%;
            max-height: 85%;
            border-radius: 4px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .lightbox.active .lightbox-content {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            z-index: 1010;
        }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 50px;
            font-weight: bold;
            padding: 15px;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s, background 0.2s;
            border-radius: 5px;
            z-index: 1010;
        }
        .lightbox-nav:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .lightbox-prev {
            left: 20px;
        }
        .lightbox-next {
            right: 20px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="gallery.html" class="btn-back">⬅ Back to Main Gallery</a>
        <h1>Timber Dam Examples</h1>
        <p class="intro">Reviewing field implementations of standard timber dams used for ditch blocking and rewetting projects.</p>
    </div>

    <div class="sub-gallery-grid">
        <div class="photo-card">
            <img src="images/timber_dam.jpeg" alt="Timber dam example 1">
        </div>
        
        <div class="photo-card">
            <img src="images/timber_dam_2.jpeg" alt="Timber dam example 2">
        </div>

        <div class="photo-card">
            <img src="images/timber-dam-2.jpg" alt="Timber dam example 3">
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <span class="lightbox-nav lightbox-prev">&#10094;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Enlarged view">
        <span class="lightbox-nav lightbox-next">&#10095;</span>
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const cards = Array.from(document.querySelectorAll('.photo-card'));
        const prevBtn = document.querySelector('.lightbox-prev');
        const nextBtn = document.querySelector('.lightbox-next');
        
        let currentIndex = 0;

        function updateLightbox(index) {
            currentIndex = index;
            const img = cards[currentIndex].querySelector('img');
            lightboxImg.src = img.src;
            lightboxImg.alt = img.alt || "Enlarged view";
        }

        cards.forEach((card, index) => {
            card.addEventListener('click', () => {
                updateLightbox(index);
                lightbox.classList.add('active');
            });
        });

        function showNext() {
            let nextIndex = (currentIndex + 1) % cards.length;
            updateLightbox(nextIndex);
        }

        function showPrev() {
            let prevIndex = (currentIndex - 1 + cards.length) % cards.length;
            updateLightbox(prevIndex);
        }

        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            showNext();
        });

        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            showPrev();
        });

        lightbox.addEventListener('click', (e) => {
            if (!e.target.classList.contains('lightbox-nav') && e.target !== lightboxImg) {
                lightbox.classList.remove('active');
                setTimeout(() => { lightboxImg.src = ''; }, 300);
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'ArrowRight') {
                showNext();
            } else if (e.key === 'ArrowLeft') {
                showPrev();
            } else if (e.key === 'Escape') {
                lightbox.classList.remove('active');
                setTimeout(() => { lightboxImg.src = ''; }, 300);
            }
        });
    </script>

</body>
</html>
