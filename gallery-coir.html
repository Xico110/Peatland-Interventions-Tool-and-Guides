<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coir Examples</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #2c4c38;
            color: #333;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .header-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        h1 {
            color: white;
            margin: 0 0 10px 0;
            font-size: 28px;
        }
        p.intro {
            color: #e2f0d9;
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.5;
        }
        .sub-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer; /* Changes cursor to pointer to signal it's clickable */
            transition: transform 0.2s;
        }
        .photo-card:hover {
            transform: scale(1.02); /* Slight lift effect on hover */
        }
        .photo-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }
        .photo-caption {
            padding: 12px;
            font-size: 14px;
            color: #555;
            text-align: center;
            font-style: italic;
        }

        /* --- LIGHTBOX MODAL STYLES --- */
        .lightbox {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        /* When active, show the lightbox */
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox-content {
            max-width: 90%;
            max-height: 85%;
            border-radius: 4px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .lightbox.active .lightbox-content {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <a href="gallery.html" class="btn-back">⬅ Back to Main Gallery</a>
        <h1>Coir Examples</h1>
        <p class="intro">Reviewing field implementations of coir logs used for ditch blocking and rewetting projects.</p>
    </div>

    <div class="sub-gallery-grid">
        <div class="photo-card">
            <img src="images/coir.jpg" alt="Coir installation 1">
        </div>
        
        <div class="photo-card">
            <img src="images/coir_1.jpg" alt="Coir installation 2">
        </div>

        <div class="photo-card">
            <img src="images/coir_2.jpeg" alt="Coir installation 3">
        </div>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const cards = document.querySelectorAll('.photo-card');

        // Open lightbox when clicking on a card
        cards.forEach(card => {
            card.addEventListener('click', () => {
                const img = card.querySelector('img');
                lightboxImg.src = img.src; // Pass the clicked image source to the modal
                lightboxImg.alt = img.alt;
                lightbox.classList.add('active');
            });
        });

        // Close lightbox when clicking anywhere on the background or close button
        lightbox.addEventListener('click', (e) => {
            // Only close if user clicks the background overlay or the close button
            if (e.target !== lightboxImg) {
                lightbox.classList.remove('active');
                // Optional: clear src after transition to prevent previous image flicker next time
                setTimeout(() => { lightboxImg.src = ''; }, 300);
            }
        });
    </script>

</body>
</html>
